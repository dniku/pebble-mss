name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Pebble app
    runs-on: ubuntu-latest
    # Rebble's Docker Hub organization publishes rebble/pebble-sdk as a Debian
    # based Pebble SDK image. Docker Hub currently exposes this image primarily
    # as the latest tag, so the workflow documents the trusted source here rather
    # than performing an unpinned manual install from third-party URLs.
    container:
      image: rebble/pebble-sdk:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Disable Pebble SDK analytics prompt
        shell: bash
        run: |
          mkdir -p "$HOME/.pebble-sdk"
          touch "$HOME/.pebble-sdk/NO_TRACKING"

      - name: Install Pebble SDK core
        shell: bash
        env:
          SDK_CORE_URL: https://github.com/aveao/PebbleArchive/raw/master/SDKCores/sdk-core-4.3.tar.bz2
          SDK_CORE_ARCHIVE: /tmp/sdk-core-4.3.tar.bz2
        run: |
          set -euo pipefail
          if command -v curl >/dev/null 2>&1; then
            curl --fail --location --retry 3 --output "$SDK_CORE_ARCHIVE" "$SDK_CORE_URL"
          else
            wget --tries=3 --output-document "$SDK_CORE_ARCHIVE" "$SDK_CORE_URL"
          fi
          yes | pebble sdk install "$SDK_CORE_ARCHIVE"

      - name: Show Pebble SDK environment
        run: |
          pebble --version
          pebble sdk list || true

      - name: Build PBW
        run: pebble build

      - name: Locate PBW artifact
        id: pbw
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          pbws=(build/**/*.pbw)
          if (( ${#pbws[@]} == 0 )); then
            echo "No .pbw files found under build/" >&2
            exit 1
          fi
          printf 'Found PBW artifacts:\n'
          printf '  %s\n' "${pbws[@]}"

      - name: Upload PBW artifact
        uses: actions/upload-artifact@v4
        with:
          name: pebble-pbw
          path: build/**/*.pbw
          if-no-files-found: error
