name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: check version
        run: |
          package_version="$(python -c 'import json; print(json.load(open("package.json"))["version"])')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "::error::package.json version $package_version does not match tag $GITHUB_REF_NAME"
            exit 1
          fi
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - name: install pebble
        run: uv tool install pebble-tool
      - name: install sdk
        run: pebble sdk install 4.5
      - name: make
        run: pebble build
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pbw=(build/*.pbw)
          if [ ! -e "${pbw[0]}" ]; then
            echo "::error::build produced no .pbw file"
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" "${pbw[@]}" --verify-tag --generate-notes --fail-on-no-commits
